<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>火灾警情详情</title>
  <style>
    /* 基础样式 */
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background-color: #0a1a2f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    /* 状态栏 */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      background-color: #0a1a2f;
      color: white;
      font-size: 12px;
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* 顶部导航栏 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background-color: #0d2640;
      border-bottom: 1px solid #1a3a60;
    }

    .back-button {
      width: 24px;
      height: 24px;
      color: #a0a0a0;
      cursor: pointer;
      font-size: 20px;
    }

    .page-title {
      font-size: 20px;
      font-weight: bold;
      color: white;
    }

    .status-button {
      background-color: #00e676;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
    }

    /* 主内容 */
    .main-content {
      flex: 1;
      padding: 0 20px 20px;
      overflow-y: auto;
    }

    /* 地图区域 */
    .map-card {
      background-color: #0d2640;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #1a3a60;
      position: relative;
      height: 180px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .map-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .map-icon {
      width: 48px;
      height: 48px;
      background-color: #00e676;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
    }

    .map-text {
      color: #a0a0a0;
      font-size: 14px;
    }

    .location-marker {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #d32f2f;
      font-size: 12px;
      background-color: rgba(211, 47, 47, 0.2);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .destination-marker {
      position: absolute;
      bottom: 20px;
      right: 20px;
      color: #00e676;
      font-size: 12px;
      background-color: rgba(0, 230, 118, 0.2);
      padding: 4px 8px;
      border-radius: 4px;
    }

    /* 信息卡片 */
    .info-card {
      background-color: #0d2640;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #1a3a60;
    }

    .info-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: #00e676;
      font-weight: bold;
    }

    .info-icon {
      width: 20px;
      height: 20px;
      background-color: #00e676;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 12px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #1a3a60;
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #a0a0a0;
    }

    .info-value {
      color: white;
      font-weight: bold;
    }

    /* 调派力量卡片 */
    .force-card {
      background-color: #0d2640;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      border: 1px solid #1a3a60;
    }

    .force-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      color: #00e676;
      font-weight: bold;
    }

    .force-icon {
      width: 20px;
      height: 20px;
      background-color: #00e676;
      border-radius: 4px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 12px;
    }

    .vehicle-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background-color: #0e3a5e;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    .vehicle-item:last-child {
      margin-bottom: 0;
    }

    .vehicle-icon {
      width: 40px;
      height: 40px;
      background-color: #00e676;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
    }

    .vehicle-info {
      flex: 1;
    }

    .vehicle-name {
      font-weight: bold;
      color: white;
      font-size: 16px;
    }

    .vehicle-details {
      color: #a0a0a0;
      font-size: 12px;
    }

    /* 底部按钮 */
    .bottom-buttons {
      display: flex;
      gap: 16px;
      margin-top: 20px;
    }

    .nav-button {
      flex: 1;
      background-color: #00e676;
      color: white;
      padding: 16px;
      border-radius: 12px;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .register-button {
      background-color: #0d2640;
      border: 1px solid #00e676;
      color: #00e676;
    }
  </style>
</head>
<body>
  <!-- 状态栏 -->
  <div class="status-bar">
    <div class="status-item">
      <span>5G</span>
    </div>
    <div class="status-item">
      <span>100%</span>
    </div>
  </div>

  <!-- 顶部导航栏 -->
  <div class="header">
    <div class="back-button">←</div>
    <div class="page-title">火灾警情详情</div>
    <div class="status-button">出动中</div>
  </div>

  <!-- 主内容 -->
  <div class="main-content">
    <!-- 地图区域 -->
    <div class="map-card">
      <div class="location-marker">您的位置</div>
      <div class="map-placeholder">
        <div class="map-icon">📍</div>
        <div class="map-text">地图加载中...</div>
      </div>
      <div class="destination-marker">目的地</div>
    </div>

    <!-- 基础信息 -->
    <div class="info-card">
      <div class="info-title">
        <div class="info-icon">ℹ</div>
        基础信息
      </div>
      <div class="info-item">
        <div class="info-label">警情类型</div>
        <div class="info-value">火灾</div>
      </div>
      <div class="info-item">
        <div class="info-label">报警电话</div>
        <div class="info-value">138****5678</div>
      </div>
      <div class="info-item">
        <div class="info-label">报警人</div>
        <div class="info-value">李先生</div>
      </div>
      <div class="info-item">
        <div class="info-label">详细地址</div>
        <div class="info-value">合肥市蜀山区天鹅湖路888号</div>
      </div>
    </div>

    <!-- 调派力量 -->
    <div class="force-card">
      <div class="force-title">
        <div class="force-icon">🚒</div>
        调派力量
      </div>
      <div class="vehicle-item">
        <div class="vehicle-icon">🚛</div>
        <div class="vehicle-info">
          <div class="vehicle-name">皖A • 11921</div>
          <div class="vehicle-details">蜀山消防救援站 • 水罐消防车</div>
        </div>
      </div>
      <div class="vehicle-item">
        <div class="vehicle-icon">🚛</div>
        <div class="vehicle-info">
          <div class="vehicle-name">皖A • 11922</div>
          <div class="vehicle-details">蜀山消防救援站 • 泡沫消防车</div>
        </div>
      </div>
      <div class="vehicle-item">
        <div class="vehicle-icon">🚛</div>
        <div class="vehicle-info">
          <div class="vehicle-name">皖A • 11923</div>
          <div class="vehicle-details">特勤消防救援站 • 举高消防车</div>
        </div>
      </div>
    </div>

    <!-- 底部按钮 -->
    <div class="bottom-buttons">
      <div class="nav-button">
        开始导航
      </div>
      <div class="nav-button register-button">
        <span>✅</span>
        上车登记
      </div>
    </div>
  </div>
</body>
</html>
